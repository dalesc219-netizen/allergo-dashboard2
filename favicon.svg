<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Легкое свечение для акцентного цвета -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Темно-серый скругленный фон (squircle) -->
  <rect width="64" height="64" rx="16" fill="#1C1C1E" />
  
  <g filter="url(#glow)">
    <!-- Абстрактный лист (занимает ~50% площади) -->
    <path d="M43 17 C47 17 49 20 49 25 C49 39 37 47 21 47 C17 47 15 44 17 39 C19 25 29 17 43 17 Z" fill="#32D74B" />
    <!-- Минималистичный вырез (прожилка/стебель) -->
    <path d="M19 45 L31 33" stroke="#1C1C1E" stroke-width="4" stroke-linecap="round" />
  </g>
</svg>